apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-manager-ingress
  annotations:
    cert-manager.io/issuer: selfsigned-issuer
spec:
  tls:
  - hosts:
    - task-manager.local
    secretName: task-manager-tls
  rules:
  - host: task-manager.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: task-manager-service
            port:
              number: 80
