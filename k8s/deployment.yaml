apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-task-manager
  template:
    metadata:
      labels:
        app: devops-task-manager
    spec:
      containers:
        - name: task-manager
          image: pikachu003/devops-task-manager:metrics
          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: devops
            - name: DB_PASSWORD
              value: devops
            - name: DB_NAME
              value: taskdb
