apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-task-manager
  template:
    metadata:
      labels:
        app: devops-task-manager
    spec:
      containers:
        - name: task-manager
          image: pikachu003/devops-task-manager:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: devops
            - name: DB_PASSWORD
              value: devops
            - name: DB_NAME
              value: taskdb
