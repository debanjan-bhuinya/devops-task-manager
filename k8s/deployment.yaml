apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
      - name: task-manager
        image: debanjan-bhuinya/devops-task-manager:latest
        ports:
        - containerPort: 8080
